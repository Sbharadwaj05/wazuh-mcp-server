# ---------------------------------------------------------------------------
# Wazuh + MCP Server — single-node development stack
# ---------------------------------------------------------------------------

version: "3.8"

services:
  # ---- Wazuh Manager (API + analysis engine) ---------------------------
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.0
    hostname: wazuh.manager
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
      - "1515:1515/tcp"
      - "1516:1516/tcp"
      - "55000:55000/tcp"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - API_USERNAME=admin
      - API_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=certificate
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ./config/wazuh_manager/ossec.conf:/var/ossec/etc/ossec.conf:ro
    networks:
      - wazuh-net
    depends_on:
      wazuh.indexer:
        condition: service_healthy

  # ---- Wazuh Indexer ---------------------------------------------------
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.0
    hostname: wazuh.indexer
    restart: unless-stopped
    ports:
      - "9200:9200/tcp"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      # ⚠️ DEV ONLY: Security plugin disabled for local testing.
      # In production, remove these two lines and configure certificates.
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
    volumes:
      - wazuh_indexer_data:/usr/share/wazuh-indexer/data
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ---- Wazuh Dashboard -------------------------------------------------
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    hostname: wazuh.dashboard
    restart: unless-stopped
    ports:
      - "443:5601/tcp"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager:55000
      - API_USERNAME=admin
      - API_PASSWORD=SecretPassword
      - DASHBOARD_USERNAME=admin
      - DASHBOARD_PASSWORD=SecretPassword
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERT=/usr/share/wazuh-dashboard/certs/dashboard.pem
      - SERVER_SSL_KEY=/usr/share/wazuh-dashboard/certs/dashboard-key.pem
    volumes:
      - wazuh_dashboard_data:/usr/share/wazuh-dashboard/data
    networks:
      - wazuh-net
    depends_on:
      wazuh.indexer:
        condition: service_healthy

  # ---- MCP Server ------------------------------------------------
  sb-siem-mcp:
    build: .
    image: sb-siem-mcp:latest
    container_name: sb-siem-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - WAZUH_API_URL=https://wazuh.manager:55000
      - WAZUH_USERNAME=admin
      - WAZUH_PASSWORD=SecretPassword
      # WAZUH_INSECURE must be false in production — TLS verification is
      # required for any deployment outside localhost dev. The Wazuh indexer
      # security plugin must also be enabled (remove DISABLE_SECURITY_PLUGIN).
      - WAZUH_INSECURE=false
      - WAZUH_MCP_HOST=0.0.0.0
      - WAZUH_MCP_PORT=8000
      - WAZUH_RATE_LIMIT_TOKENS=30
      - WAZUH_RATE_LIMIT_PERIOD=60
    volumes:
      - sb_siem_mcp_audit:/home/wazuhmcp/.wazuh-mcp
    networks:
      - wazuh-net
    depends_on:
      - wazuh.manager

volumes:
  wazuh_manager_data:
  wazuh_indexer_data:
  wazuh_dashboard_data:
  wazuh_mcp_audit:

networks:
  wazuh-net:
    driver: bridge
